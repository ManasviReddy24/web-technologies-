<html>
    <head>
        <style>
            input[type=text] {
                background-color: lightblue;
                width: 1200px;
                color: blue;
                padding: 10px;
            }
            input[type=number] {
                background-color: lightpink;
                width: 1200px;
                color:red;
                padding: 10px;
            }
            input[type=button] {
                background-color: yellow;
                width: 800px;
                color: black ;
                padding: 10px;
            }
            </style>
    </head>
    <body bgcolor="lightgreen" align="center">
        <form>
            NAME <input type="text" placeholder="Enter your name"><br><br>
            OCCUPATION <input type="text" placeholder="Enter your occupation"><br><br>
            AMOUNT <input type="number" placeholder="Enter your amount" 
            id="A"><br><br>
            INTEREST <input type="number" placeholder="Enter your interest" 
            id="I"><br><br>
            TENURE <input type="number" placeholder="Enter your tenure" 
            id="T"><br><br>
            <input type="button" value="Calculate EMI" onclick="calculate()">
        </form>
        <p id="result"></p>
        <script>
            function calculate()
            {
            var amount = document.getElementById("A").value;
            var interest = document.getElementById("I").value;
            var tenure = document.getElementById("T").value;
            var roi = interest / 12 *100;
            var months = tenure * 12;
            var emi = (amount * roi * Math.pow(1 + roi, months)) / (Math.pow(1 + roi, months) - 1);
            document.getElementById("result").innerHTML = "Your EMI is: " + emi.toFixed(2);
        }
        
        </script>
    </body><br>

            CLASS : III year IT-A <br>

    </p>
</html>
